<form
	class="flex flex-col gap-5"
	novalidate
	(ngSubmit)="onSubmit()"
	[formGroup]="form"
>
	<lib-ui-input
		label="Nueva contraseña"
		type="password"
		placeholder="••••••••"
		prefixIcon="lock"
		hint="Mínimo 8 caracteres"
		formControlName="password"
	/>

	<lib-ui-input
		label="Confirmar nueva contraseña"
		type="password"
		placeholder="••••••••"
		prefixIcon="lock"
		formControlName="confirmPassword"
	/>

	<lib-ui-button
		type="submit"
		[fullWidth]="true"
		size="lg"
		[loading]="loading()"
	>
		Restablecer contraseña
	</lib-ui-button>
</form>

<form
	[formGroup]="form"
	(ngSubmit)="submit()"
	class="flex flex-col gap-5"
	novalidate
>
	<lib-ui-input
		label="Correo electrónico"
		type="email"
		placeholder="tu@empresa.com"
		prefixIcon="mail"
		formControlName="email"
	/>

	<lib-ui-button
		type="submit"
		[fullWidth]="true"
		size="lg"
	>
		Enviar instrucciones
	</lib-ui-button>
</form>

<!-- Template: nombre con avatar -->
<ng-template #nameCell let-agent>
	<div class="flex items-center gap-3">
		<lib-ui-avatar [name]="agent.name" />
		<div class="min-w-0">
			<p class="font-medium text-surface-900 dark:text-surface-100 truncate">
				{{ agent.name }}
			</p>
			@if (agent.userId) {
				<p class="text-xs text-surface-400 dark:text-surface-500 truncate">
					ID: {{ agent.userId }}
				</p>
			}
		</div>
	</div>
</ng-template>

<!-- Template: comisión con badge -->
<ng-template #commissionCell let-agent>
	<lib-ui-badge variant="success">
		{{ agent.commissionRate }}%
	</lib-ui-badge>
</ng-template>

<lib-ui-data-table
	[columns]="columns()"
	[rows]="agents()"
	[actions]="actions"
	[loading]="loading()"
	emptyIcon="users"
	emptyMessage="No se encontraron agentes de venta"
	emptyHint="Crea tu primer agente para comenzar"
	(action)="onAction($event)"
/>

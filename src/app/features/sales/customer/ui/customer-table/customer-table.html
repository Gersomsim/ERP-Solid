<!-- Template custom para la celda del nombre: avatar + nombre + teléfono -->
<ng-template #nameCell let-customer>
    <div class="flex items-center gap-3">
        <lib-ui-avatar [name]="customer.name" />
        <div class="min-w-0">
            <p class="font-medium text-surface-900 dark:text-surface-100 truncate">
                {{ customer.name }}
            </p>
            @if (customer.phone) {
                <p class="text-xs text-surface-400 dark:text-surface-500 truncate">
                    {{ customer.phone }}
                </p>
            }
        </div>
    </div>
</ng-template>

<lib-ui-data-table
    [columns]="columns()"
    [rows]="customers()"
    [actions]="actions"
    [loading]="loading()"
    emptyIcon="users"
    emptyMessage="No se encontraron clientes"
    emptyHint="Intenta ajustar tu búsqueda"
    (action)="onAction($event)"
/>

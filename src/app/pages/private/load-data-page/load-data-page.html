<app-system-template [loading]="true">

    <!-- Estado de carga visible en el área principal mientras se prepara la sesión -->
    <div class="flex flex-col items-center justify-center h-full min-h-[calc(100vh-64px)] gap-8 px-6">

        <!-- Icono animado -->
        <div
            class="w-16 h-16 rounded-2xl bg-primary-100 dark:bg-primary-900/30
                   flex items-center justify-center"
        >
            <lib-ui-icon
                icon="loader-circle"
                [size]="32"
                class="text-primary-600 dark:text-primary-400 animate-spin"
            />
        </div>

        <!-- Texto principal -->
        <div class="text-center space-y-2">
            <p class="text-surface-900 dark:text-surface-50 font-semibold text-lg">
                Cargando tu espacio de trabajo
            </p>
            <p class="text-surface-500 dark:text-surface-400 text-sm">
                Configurando permisos, módulos y preferencias...
            </p>
        </div>

        <!-- Pasos skeleton -->
        <div class="flex flex-col gap-3 w-full max-w-xs">
            @for (step of steps; track $index) {
                <div class="flex items-center gap-3">
                    <div
                        class="w-5 h-5 rounded-full bg-surface-200 dark:bg-surface-700
                               animate-pulse flex-shrink-0"
                    ></div>
                    <div class="flex-1 space-y-1">
                        <div
                            class="h-3 bg-surface-200 dark:bg-surface-700 rounded animate-pulse"
                            [style.width.%]="65 + ($index % 3) * 12"
                        ></div>
                    </div>
                </div>
            }
        </div>

    </div>

</app-system-template>

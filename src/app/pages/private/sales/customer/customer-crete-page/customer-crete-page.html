<lib-ui-main-container>
	<div class="space-y-6">
		<!-- ── Encabezado ───────────────────────────────────────────── -->
		<div class="flex items-center gap-3">
			<lib-ui-link link="../list" variant="ghost" size="sm">
				<lib-ui-icon icon="arrow-left" [size]="15" />
			</lib-ui-link>

			<lib-ui-page-title>
				Nuevo cliente
				<span subtitle>Completa los datos para registrar un cliente.</span>
			</lib-ui-page-title>
		</div>

		<!-- ── Card con formulario ───────────────────────────────────── -->
		<div class="rounded-xl border border-surface-200 dark:border-surface-700 bg-white dark:bg-surface-900 p-6 shadow-sm">
			<app-customer-form
				[loading]="loading()"
				(submit)="onSubmit($event)"
				(cancel)="onCancel()"
			/>
		</div>
	</div>
</lib-ui-main-container>

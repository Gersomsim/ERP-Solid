<lib-ui-main-container>
	<div class="space-y-5">
		<!-- ── Encabezado de página ───────────────────────────────────── -->
		<div class="flex items-start justify-between gap-4">
			<lib-ui-page-title>
				Clientes
				<span subtitle>
					{{ totalItems() }} cliente{{ totalItems() !== 1 ? 's' : '' }} registrado{{
						totalItems() !== 1 ? 's' : ''
					}}
				</span>
			</lib-ui-page-title>

			<lib-ui-link
				link="../create"
				type="link"
			>
				<lib-ui-icon
					icon="plus"
					[size]="16"
				/>
				Nuevo cliente
			</lib-ui-link>
		</div>

		<!-- ── Tabla ──────────────────────────────────────────────────── -->
		<lib-ui-card padding="none">
			<lib-ui-card-header>
				<div class="flex-1 max-w-sm">
					<lib-ui-search-input placeholder="Buscar por nombre, RFC o ciudad..." />
				</div>
				<span class="text-xs text-surface-500 dark:text-surface-400">
					{{ totalItems() }} resultado{{ totalItems() !== 1 ? 's' : '' }}
				</span>
			</lib-ui-card-header>

			<app-customer-table
				[customers]="customerRes.value()?.data ?? []"
				[loading]="customerRes.isLoading()"
				(view)="onView($event)"
				(edit)="onEdit($event)"
			/>
		</lib-ui-card>

		<!-- ── Paginación ─────────────────────────────────────────────── -->
		@if (paginate(); as pagination) {
			<lib-ui-paginator
				[total]="pagination.totalItems"
				[pageSize]="pagination.itemsPerPage"
				[page]="pagination.currentPage"
			/>
		}
	</div>
</lib-ui-main-container>

<lib-ui-main-container>
	<div class="space-y-5">
		<!-- ── Encabezado de página ───────────────────────────────────── -->
		<div class="flex items-start justify-between gap-4">
			<lib-ui-page-title>
				Clientes
				<span subtitle>
					{{ total() }} cliente{{ total() !== 1 ? 's' : '' }} registrado{{ total() !== 1 ? 's' : '' }}
				</span>
			</lib-ui-page-title>

			<lib-ui-link
				link="../create"
				type="link"
			>
				<lib-ui-icon
					icon="plus"
					[size]="16"
				/>
				Nuevo cliente
			</lib-ui-link>
		</div>

		<!-- ── Barra de herramientas ──────────────────────────────────── -->
		<div class="flex items-center gap-3">
			<div class="flex-1 max-w-sm">
				<lib-ui-search-input placeholder="Buscar por nombre, RFC o ciudad..." />
			</div>
		</div>

		<!-- ── Tabla ──────────────────────────────────────────────────── -->
		<div class="mb-4">
			<app-customer-table
				[customers]="pagedCustomers()"
				[loading]="false"
				(view)="onView($event)"
				(edit)="onEdit($event)"
			/>
		</div>

		<!-- ── Paginación ─────────────────────────────────────────────── -->
		@if (total() > 0) {
			<lib-ui-paginator
				[total]="total()"
				[pageSize]="pageSize"
				[page]="page()"
				(pageChange)="onPageChange($event)"
			/>
		}
	</div>
</lib-ui-main-container>

<div class="p-6 space-y-5 max-w-7xl mx-auto">
	<!-- ── Encabezado de página ───────────────────────────────────── -->
	<div class="flex items-start justify-between gap-4">
		<div>
			<h1 class="text-xl font-semibold text-surface-900 dark:text-surface-50">Clientes</h1>
			<p class="mt-0.5 text-sm text-surface-500 dark:text-surface-400">
				{{ total() }} cliente{{ total() !== 1 ? 's' : '' }} registrado{{ total() !== 1 ? 's' : '' }}
			</p>
		</div>

		<lib-ui-link
			link="../create"
			type="link"
		>
			<lib-ui-icon
				icon="plus"
				[size]="16"
			/>
			Nuevo cliente
		</lib-ui-link>
	</div>

	<!-- ── Barra de herramientas ──────────────────────────────────── -->
	<div class="flex items-center gap-3">
		<div class="flex-1 max-w-sm">
			<lib-ui-search-input
				placeholder="Buscar por nombre, RFC o ciudad..."
				(search)="onSearch($event)"
			/>
		</div>
	</div>

	<!-- ── Tabla ──────────────────────────────────────────────────── -->
	<app-customer-table
		[customers]="pagedCustomers()"
		[loading]="false"
		(view)="onView($event)"
		(edit)="onEdit($event)"
		(delete)="onDelete($event)"
	/>

	<!-- ── Paginación ─────────────────────────────────────────────── -->
	@if (total() > 0) {
		<lib-ui-paginator
			[total]="total()"
			[pageSize]="pageSize"
			[page]="page()"
			(pageChange)="onPageChange($event)"
		/>
	}
</div>

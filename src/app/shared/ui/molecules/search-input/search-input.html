<div class="relative">
    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
        <lib-ui-icon icon="search" [size]="16" class="text-surface-400 dark:text-surface-500" />
    </div>

    <input
        type="text"
        [value]="value"
        [placeholder]="placeholder()"
        (input)="onInput($event)"
        class="w-full h-10 pl-9 pr-9 text-sm rounded-lg border
               bg-white dark:bg-surface-900
               border-surface-200 dark:border-surface-700
               text-surface-900 dark:text-surface-100
               placeholder:text-surface-400 dark:placeholder:text-surface-500
               focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent
               transition-colors duration-150"
    />

    @if (value) {
        <button
            type="button"
            (click)="clear()"
            class="absolute inset-y-0 right-0 flex items-center pr-3
                   text-surface-400 hover:text-surface-600
                   dark:text-surface-500 dark:hover:text-surface-300
                   transition-colors duration-150"
            aria-label="Limpiar búsqueda"
        >
            <lib-ui-icon icon="x" [size]="14" />
        </button>
    }
</div>

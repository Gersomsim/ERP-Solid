<div class="flex items-center w-full">
    @for (step of steps(); track step; let i = $index; let last = $last) {

        <!-- Paso -->
        <div class="flex flex-col items-center gap-2 z-10">

            <!-- Círculo -->
            <div
                class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold
                       ring-2 transition-all duration-300 shrink-0"
                [class]="
                    i < currentStep()
                        ? 'bg-primary-800 ring-primary-800 text-white dark:bg-primary-600 dark:ring-primary-600'
                        : i === currentStep()
                            ? 'bg-primary-800 ring-primary-800 text-white dark:bg-primary-600 dark:ring-primary-600'
                            : 'bg-white ring-surface-200 text-surface-400 dark:bg-surface-800 dark:ring-surface-700 dark:text-surface-500'
                "
            >
                @if (i < currentStep()) {
                    <lib-ui-icon icon="check" [size]="14" />
                } @else {
                    {{ i + 1 }}
                }
            </div>

            <!-- Label -->
            <span
                class="text-xs font-medium whitespace-nowrap transition-colors duration-300"
                [class]="
                    i <= currentStep()
                        ? 'text-surface-700 dark:text-surface-200'
                        : 'text-surface-400 dark:text-surface-600'
                "
            >
                {{ step }}
            </span>
        </div>

        <!-- Línea conectora -->
        @if (!last) {
            <div class="flex-1 h-px mx-3 mb-6 transition-colors duration-300"
                [class]="
                    i < currentStep()
                        ? 'bg-primary-800 dark:bg-primary-600'
                        : 'bg-surface-200 dark:bg-surface-700'
                "
            ></div>
        }
    }
</div>
